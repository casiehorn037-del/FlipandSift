services:
  - type: web
    name: flipandsift
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npx pnpm@10.4.1 install && npx pnpm@10.4.1 run build
    startCommand: npx pnpm@10.4.1 start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
        length: 32
      - key: VITE_APP_ID
        value: flipandsift_app
      - key: OAUTH_SERVER_URL
        value: https://auth.manus.im
      - key: VITE_OAUTH_PORTAL_URL
        value: https://auth.manus.im
      - key: DATABASE_URL
        sync: false
        required: true
      - key: OWNER_OPEN_ID
        sync: false
        required: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
    autoDeploy: true
