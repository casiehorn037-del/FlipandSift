services:
  - type: web
    name: flipandsift
    runtime: node
    plan: starter
    region: oregon
    buildCommand: |
      echo "=== CLEAN BUILD START ===" 
      rm -rf dist node_modules .vite .pnpm-store
      npm install -g pnpm
      pnpm install --no-frozen-lockfile
      pnpm run build
      echo "=== BUILD COMPLETE ==="
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
        length: 32
      - key: DATABASE_URL
        sync: false
        required: true
      - key: OWNER_OPEN_ID
        sync: false
    autoDeploy: true
